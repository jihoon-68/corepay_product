server:
  port: 8083
spring:
  application:
    name: product
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/corepay_product_db
    username: user
    password: user1234

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  management:
    endpoints:
      web:
        exposure:
          include: prometheus, health, info, metrics # 프로메테우스가 접근할 수 있도록 엔드포인트 개방
    metrics:
      tags:
        application: ${spring.application.name} # 그라파나 대시보드에서 서버 필터링할 때 사용

  logging:
    level:
      org.hibernate.orm.jdbc.bind: TRACE