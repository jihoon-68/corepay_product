server:
  port: 8083

spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: product
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092 # 카프카 서버 주소
    consumer:
      group-id: ${spring.application.name}-group # 각 서버의 고유 그룹 이름
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: "1"
      retries: 3
    properties:
      spring:
        json:
          trusted:
            packages: "*"
          use:
            type:
              headers: false

  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 16
          max-idle: 16
          min-idle: 8
        shutdown-timeout: 100ms


  threads:
    virtual:
      enabled: true

  logging:
    level:
      org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: prometheus, health, info, metrics,threaddump, heapdump # 프로메테우스가 접근할 수 있도록 엔드포인트 개방
  metrics:
    tags:
      application: ${spring.application.name} # 그라파나 대시보드에서 서버 필터링할 때 사용
